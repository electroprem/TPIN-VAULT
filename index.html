<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TPIN Vault</title>
    
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/11528/11528763.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/11528/11528763.png">

    <link rel="manifest" href='data:application/json,{"name":"TPIN Vault","short_name":"TPIN","start_url":".","display":"standalone","background_color":"#020617","theme_color":"#0ea5e9","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/11528/11528763.png","sizes":"512x512","type":"image/png","purpose":"any maskable"},{"src":"https://cdn-icons-png.flaticon.com/192/11528/11528763.png","sizes":"192x192","type":"image/png"}]}'>

    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(15, 23, 42, 0.7);
            --accent: #00d2ff;
            --accent-purple: #9d50bb;
            --text: #f1f5f9;
            --text-dim: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(157, 80, 187, 0.1) 0px, transparent 40%);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 16px 160px; /* Extra bottom padding for dock */
        }

        .app { width: 100%; max-width: 480px; }

        header {
            padding: 40px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-wrap {
            position: sticky;
            top: 10px;
            z-index: 50;
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #vault-list { display: grid; gap: 12px; }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeIn 0.5s ease backwards;
        }

        .card:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

        .meta { flex: 1; min-width: 0; }
        .owner { display: block; font-weight: 600; font-size: 1.1rem; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .date { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

        .tpin-trigger {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: rgba(0,0,0,0.3);
            color: var(--accent);
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid rgba(0, 210, 255, 0.1);
            margin: 0 12px;
            min-width: 80px;
            text-align: center;
            font-size: 0.9rem;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-action {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* FIXED INPUT DOCK */
        .dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 440px;
            background: rgba(15, 20, 30, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            z-index: 100;
        }

        .dock input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        #owner { flex: 2; min-width: 0; }
        #tpin { flex: 1; width: 80px; min-width: 0; text-align: center; }

        .dock input:focus { 
            border-color: var(--accent); 
            background: rgba(255,255,255,0.08); 
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 16px;
            height: 48px;
            width: 54px;
            min-width: 54px;
            font-weight: bold;
            cursor: pointer;
            display: grid;
            place-items: center;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-add:active { transform: scale(0.95); }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--success);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::placeholder { color: #475569; }
    </style>
</head>
<body>

<div id="toast">COPIED TO CLIPBOARD</div>

<div class="app">
    <header>
        <div class="logo">TPIN VAULT</div>
        <div style="font-size: 0.7rem; color: var(--text-dim);">SECURED LOCAL DATA</div>
    </header>

    <div class="search-wrap">
        <input type="text" id="search" class="search-input" placeholder="Search entries..." oninput="render()">
    </div>

    <div id="vault-list"></div>
</div>

<div class="dock">
    <input type="text" id="owner" placeholder="Holder Name" autocomplete="off">
    <input type="password" id="tpin" placeholder="PIN" inputmode="numeric" maxlength="6">
    <button class="btn-add" onclick="addItem()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>
</div>

<script>
    let vault = JSON.parse(localStorage.getItem('tpin_v4')) || [];

    function addItem() {
        const ownerEl = document.getElementById('owner');
        const tpinEl = document.getElementById('tpin');
        
        if (!ownerEl.value || !tpinEl.value) return;

        const entry = {
            id: Date.now(),
            owner: ownerEl.value.trim(),
            tpin: tpinEl.value.trim(),
            date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
        };

        vault.unshift(entry);
        ownerEl.value = ''; 
        tpinEl.value = '';
        save();
    }

    function deleteItem(id) {
        if(confirm("Delete record?")) {
            vault = vault.filter(i => i.id !== id);
            save();
        }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function handleInteraction(el, pin) {
        // Copy functionality
        navigator.clipboard.writeText(pin).then(() => {
            showToast();
        });

        // Reveal effect
        const original = el.innerText;
        el.innerText = pin;
        el.style.color = '#fff';
        el.style.borderColor = 'var(--accent)';
        
        setTimeout(() => {
            el.innerText = '••••••';
            el.style.color = 'var(--accent)';
            el.style.borderColor = 'rgba(0, 210, 255, 0.1)';
        }, 3000);
    }

    function save() {
        localStorage.setItem('tpin_v4', JSON.stringify(vault));
        render();
    }

    function render() {
        const list = document.getElementById('vault-list');
        const query = document.getElementById('search').value.toLowerCase();
        list.innerHTML = '';

        const filtered = vault.filter(i => i.owner.toLowerCase().includes(query));

        if(filtered.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-dim); font-size:0.8rem; letter-spacing:2px;">EMPTY VAULT</div>`;
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="meta">
                    <span class="owner">${item.owner}</span>
                    <span class="date">${item.date}</span>
                </div>
                <div class="tpin-trigger" onclick="handleInteraction(this, '${item.tpin}')">••••••</div>
                <button class="btn-action" onclick="deleteItem(${item.id})">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            `;
            list.appendChild(card);
        });
    }

    // Keyboard support
    document.getElementById('tpin').addEventListener('keypress', e => { 
        if (e.key === 'Enter') addItem(); 
    });

    render();
</script>

</body>
</html>
