<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TPIN Vault</title>
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/11528/11528763.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/11528/11528763.png">

    <style>
        :root { --bg: #05070a; --glass: rgba(15, 23, 42, 0.7); --accent: #00d2ff; --accent-purple: #9d50bb; --text: #f1f5f9; --text-dim: #64748b; --success: #10b981; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); background-image: radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.1) 0px, transparent 40%), radial-gradient(at 100% 100%, rgba(157, 80, 187, 0.1) 0px, transparent 40%); color: var(--text); margin: 0; min-height: 100vh; padding: env(safe-area-inset-top) 16px 160px; display: flex; flex-direction: column; align-items: center; }
        .app { width: 100%; max-width: 480px; }
        
        /* Install Banner */
        #install-banner { display: none; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 20px; margin-bottom: 20px; backdrop-filter: blur(20px); align-items: center; justify-content: space-between; width: 100%; max-width: 480px; animation: fadeIn 0.5s ease; }
        
        header { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; background: linear-gradient(90deg, var(--accent), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-input { width: 100%; padding: 16px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; color: white; margin-bottom: 24px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .tpin-trigger { font-family: monospace; background: rgba(0,0,0,0.3); color: var(--accent); padding: 10px; border-radius: 12px; cursor: pointer; min-width: 80px; text-align: center; }
        
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 440px; background: rgba(15, 20, 30, 0.9); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 8px; display: flex; gap: 8px; z-index: 100; }
        .dock input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 14px; color: white; flex: 1; min-width: 0; }
        .btn-add { background: linear-gradient(135deg, var(--accent), var(--accent-purple)); color: white; border: none; border-radius: 16px; width: 54px; font-weight: bold; cursor: pointer; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--success); color: white; padding: 10px 24px; border-radius: 30px; transition: 0.4s; z-index: 1000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="toast">COPIED TO CLIPBOARD</div>

<div class="app">
    <div id="install-banner">
        <span style="font-size: 0.8rem;">Install TPIN Vault for offline access?</span>
        <div style="display: flex; gap: 8px;">
            <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; border:none; color:var(--text-dim); font-size:0.7rem;">Dismiss</button>
            <button id="btn-install" style="background:var(--accent); border:none; padding:5px 12px; border-radius:10px; font-weight:bold; font-size:0.7rem;">Install</button>
        </div>
    </div>

    <header>
        <div class="logo">TPIN VAULT</div>
        <div style="font-size: 0.6rem; color: var(--text-dim);">SECURED LOCAL</div>
    </header>

    <input type="text" id="search" class="search-input" placeholder="Search entries..." oninput="render()">
    <div id="vault-list"></div>
</div>

<div class="dock">
    <input type="text" id="owner" placeholder="Name" autocomplete="off">
    <input type="password" id="tpin" placeholder="PIN" inputmode="numeric" maxlength="6">
    <button class="btn-add" onclick="addItem()">+</button>
</div>

<script>
    let vault = JSON.parse(localStorage.getItem('tpin_v4')) || [];
    let deferredPrompt;

    // --- PWA INSTALL LOGIC ---
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Only show if not already installed
        if (!window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('install-banner').style.display = 'flex';
        }
    });

    document.getElementById('btn-install').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
            deferredPrompt = null;
        }
    });

    // --- APP LOGIC ---
    function addItem() {
        const o = document.getElementById('owner'), t = document.getElementById('tpin');
        if (!o.value || !t.value) return;
        vault.unshift({ id: Date.now(), owner: o.value.trim(), tpin: t.value.trim(), date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) });
        o.value = ''; t.value = '';
        save();
    }

    function deleteItem(id) {
        if(confirm("Delete?")) { vault = vault.filter(i => i.id !== id); save(); }
    }

    function handleInteraction(el, pin) {
        navigator.clipboard.writeText(pin).then(() => {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        });
        el.innerText = pin;
        setTimeout(() => { el.innerText = '••••••'; }, 3000);
    }

    function save() { localStorage.setItem('tpin_v4', JSON.stringify(vault)); render(); }

    function render() {
        const list = document.getElementById('vault-list'), q = document.getElementById('search').value.toLowerCase();
        list.innerHTML = '';
        const filtered = vault.filter(i => i.owner.toLowerCase().includes(q));
        if(!filtered.length) { list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-dim);">EMPTY</div>`; return; }
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div><div class="owner">${item.owner}</div><div style="font-size:0.7rem;color:var(--text-dim)">${item.date}</div></div>
                <div class="tpin-trigger" onclick="handleInteraction(this, '${item.tpin}')">••••••</div>
                <button style="background:none; border:none; cursor:pointer" onclick="deleteItem(${item.id})">🗑️</button>`;
            list.appendChild(card);
        });
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
    render();
</script>
</body>
</html>
