<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TPIN Vault</title>
    
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/11528/11528763.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/11528/11528763.png">

    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(15, 23, 42, 0.7);
            --accent: #00d2ff;
            --accent-purple: #9d50bb;
            --text: #f1f5f9;
            --text-dim: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(157, 80, 187, 0.1) 0px, transparent 40%);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 16px 160px;
        }

        .app { width: 100%; max-width: 480px; }

        header {
            padding: 40px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-wrap { position: sticky; top: 10px; z-index: 50; margin-bottom: 24px; }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #vault-list { display: grid; gap: 12px; }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 0.5s ease backwards;
        }

        .meta { flex: 1; min-width: 0; }
        .owner { display: block; font-weight: 600; font-size: 1.1rem; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .date { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

        .tpin-trigger {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            color: var(--accent);
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid rgba(0, 210, 255, 0.1);
            margin: 0 12px;
            min-width: 80px;
            text-align: center;
        }

        .btn-action { background: none; border: none; cursor: pointer; padding: 8px; }

        .dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 440px;
            background: rgba(15, 20, 30, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            z-index: 100;
        }

        .dock input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            flex: 1;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 16px;
            height: 48px;
            width: 54px;
            cursor: pointer;
            font-weight: bold;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--success);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            transition: 0.4s;
            z-index: 1000;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="toast">COPIED TO CLIPBOARD</div>

<div class="app">
    <header>
        <div class="logo">TPIN VAULT</div>
        <div style="font-size: 0.7rem; color: var(--text-dim);">SECURED LOCAL DATA</div>
    </header>

    <div class="search-wrap">
        <input type="text" id="search" class="search-input" placeholder="Search entries..." oninput="render()">
    </div>

    <div id="vault-list"></div>
</div>

<div class="dock">
    <input type="text" id="owner" placeholder="Holder Name" autocomplete="off">
    <input type="password" id="tpin" placeholder="PIN" inputmode="numeric" maxlength="6">
    <button class="btn-add" onclick="addItem()">+</button>
</div>

<script>
    let vault = JSON.parse(localStorage.getItem('tpin_v4')) || [];

    function addItem() {
        const ownerEl = document.getElementById('owner');
        const tpinEl = document.getElementById('tpin');
        if (!ownerEl.value || !tpinEl.value) return;
        const entry = {
            id: Date.now(),
            owner: ownerEl.value.trim(),
            tpin: tpinEl.value.trim(),
            date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
        };
        vault.unshift(entry);
        ownerEl.value = ''; tpinEl.value = '';
        save();
    }

    function deleteItem(id) {
        if(confirm("Delete record?")) {
            vault = vault.filter(i => i.id !== id);
            save();
        }
    }

    function handleInteraction(el, pin) {
        navigator.clipboard.writeText(pin).then(() => {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        });
        el.innerText = pin;
        setTimeout(() => { el.innerText = '••••••'; }, 3000);
    }

    function save() {
        localStorage.setItem('tpin_v4', JSON.stringify(vault));
        render();
    }

    function render() {
        const list = document.getElementById('vault-list');
        const query = document.getElementById('search').value.toLowerCase();
        list.innerHTML = '';
        const filtered = vault.filter(i => i.owner.toLowerCase().includes(query));
        if(filtered.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-dim);">EMPTY VAULT</div>`;
            return;
        }
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="meta">
                    <span class="owner">${item.owner}</span>
                    <span class="date">${item.date}</span>
                </div>
                <div class="tpin-trigger" onclick="handleInteraction(this, '${item.tpin}')">••••••</div>
                <button class="btn-action" onclick="deleteItem(${item.id})">🗑️</button>
            `;
            list.appendChild(card);
        });
    }

    // SERVICE WORKER REGISTRATION (Essential for PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW Registered'))
                .catch(err => console.log('SW Failed', err));
        });
    }

    render();
</script>
</body>
</html>
